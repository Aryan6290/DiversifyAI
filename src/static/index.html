<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiversifyAI — Portfolio Diversification & Risk Dashboard</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="styles.css">

    <!-- marked for MD rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Browser Native ES Module Import Map -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "htm": "https://esm.sh/htm@3.1.1",
          "lucide-react": "https://esm.sh/lucide-react@0.378.0",
          "chart.js": "https://esm.sh/chart.js@4.4.2/auto"
        }
      }
    </script>
</head>
<body>
    <div id="root">
        <!-- Premium Loading Spinner during ESM Resolution -->
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #0f172a; color: #f1f5f9; font-family: 'Outfit', sans-serif; gap: 1.5rem;">
            <div style="width: 40px; height: 40px; border: 3px solid rgba(99, 102, 241, 0.1); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <div style="font-size: 1.1rem; font-weight: 500; color: #94a3b8; letter-spacing: 0.5px;">Initializing DiversifyAI Engine...</div>
        </div>
    </div>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <!-- Main Module Script -->
    <script type="module" src="app.js?v=1.0.2"></script>
</body>
</html>
